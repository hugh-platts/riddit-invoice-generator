<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #invoice-content { display: none; }
    
    /* PDF Specific Styling - Compacted for >10 items and Single Page focus */
    .invoice-pdf-content { width: 700px; background-color: #fff; padding: 20px; border: 1px solid #333; font-size: 13px; color: #000; }
    .invoice-pdf-content .invoice-logo { width: 120px; max-width: 100%; height: auto; display: block; margin: 0 auto 15px auto; }
    .invoice-pdf-content h2 { text-align: center; margin-bottom: 15px; font-size: 1.8em; }
    .invoice-pdf-content h4 { margin-top: 15px; margin-bottom: 5px; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 3px;}
    
    /* Table Styling */
    .invoice-pdf-content table { width: 100%; border-collapse: collapse; margin-bottom: 15px; page-break-inside: auto; }
    .invoice-pdf-content table, .invoice-pdf-content th, .invoice-pdf-content td { border: 1px solid #666; }
    .invoice-pdf-content th, .invoice-pdf-content td { padding: 4px 6px; text-align: left; vertical-align: middle; page-break-inside: avoid; page-break-after: auto; }
    .invoice-pdf-content tr { page-break-inside: avoid; page-break-after: auto; }
    .invoice-pdf-content th { background-color: #f2f2f2; font-weight: bold; }
    .invoice-pdf-content .item-image { max-width: 60px; max-height: 60px; object-fit: contain; }
    
    /* Totals Box */
    .invoice-totals-box { text-align: right; margin-top: 10px; margin-bottom: 20px; page-break-inside: avoid; }
    .invoice-totals-box p { margin: 2px 0; font-size: 1.1em; }
    .invoice-totals-box h3 { margin: 5px 0 0 0; font-size: 1.4em; font-weight: bold; }

    /* Footer Sections */
    .invoice-footer-grid { display: flex; justify-content: space-between; gap: 20px; page-break-inside: avoid; margin-bottom: 20px;}
    .invoice-footer-grid > div { flex: 1; }
    .invoice-pdf-content footer { text-align: center; font-size: 0.9em; color: #555; margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; page-break-inside: avoid; }
    .invoice-pdf-content p { line-height: 1.4; margin-bottom: 5px; }
    
    /* UI Styling */
    #address-suggestions { position: absolute; z-index: 1000; width: 100%; max-height: 200px; overflow-y: auto; background-color: #fff; border: 1px solid #ced4da; border-top: none; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    #address-suggestions .list-group-item { cursor: pointer; }
    #address-suggestions .list-group-item:hover { background-color: #e9ecef; }
    .position-relative { position: relative; }
    .image-preview-thumbnail { max-width: 50px; max-height: 50px; margin-top: 5px; display: none; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">Invoice Generator</h1>
    
    <form id="invoice-form">
      <!-- Invoice Number and Date -->
      <div class="mb-3">
        <label for="invoiceNumber" class="form-label">Invoice Number</label>
        <div class="input-group">
          <span class="input-group-text">INV-</span>
          <input type="text" class="form-control" id="invoiceNumber" readonly>
          <span class="input-group-text">-</span>
          <input type="text" class="form-control" id="invoiceSequence" placeholder="001" maxlength="3" required>
        </div>
      </div>
      
      <div class="mb-3">
        <label for="invoiceDate" class="form-label">Invoice Date</label>
        <input type="text" class="form-control" id="invoiceDate" readonly>
      </div>
      
      <div class="mb-4 text-center">
        <img src="https://lh4.googleusercontent.com/3V73wOQ05wHrc2ytYs9m-nevOwktL0VfgD5aelBrxVcxDFYw0zpmy6co8w-Don93l643vyMso_2MpWHlbfAQkd2XsPZWoEW7n9oA0A3L1OKsdbI7pw7h8gMfl24yXvLNIA=w1280" alt="Company Logo" id="form-logo" style="max-width: 200px;">
      </div>
      
      <!-- Invoice To -->
      <div class="mb-3">
        <label for="invoiceToName" class="form-label">Invoice To Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="invoiceToName" placeholder="Enter recipient's name" required>
      </div>
      
      <div class="mb-3">
        <label for="invoiceEmail" class="form-label">Invoice To Email <span class="text-danger">*</span></label>
        <input type="email" class="form-control" id="invoiceEmail" placeholder="Enter recipient's email" required>
      </div>
      
      <!-- Address -->
      <div class="mb-3 position-relative">
        <label for="postcode" class="form-label">Postcode / Partial Address</label>
        <input type="text" class="form-control" id="postcode" placeholder="Enter postcode or partial address" required>
        <div id="address-suggestions" class="list-group"></div>
      </div>
      
      <div id="address-fields" style="display: none;" class="mb-3">
        <div class="mb-3"><label class="form-label">Address Line 1 <span class="text-danger">*</span></label><input type="text" class="form-control" id="addressLine1" required></div>
        <div class="mb-3"><label class="form-label">Address Line 2 <span class="text-danger">*</span></label><input type="text" class="form-control" id="addressLine2" required></div>
        <div class="mb-3"><label class="form-label">City <span class="text-danger">*</span></label><input type="text" class="form-control" id="city" required></div>
        <div class="mb-3"><label class="form-label">Postal Code <span class="text-danger">*</span></label><input type="text" class="form-control" id="postalCode" required></div>
        <div class="mb-3"><label class="form-label">Country <span class="text-danger">*</span></label><input type="text" class="form-control" id="country" required></div>
      </div>
      
      <div class="mb-3">
        <button type="button" id="enter-address-manually" class="btn btn-secondary btn-sm">Enter Address Manually</button>
      </div>
      
      <!-- Items Section -->
      <div class="mb-3 p-3 border rounded bg-light">
        <h4>Items <span class="text-danger">*</span></h4>
        <div id="items-container">
          <!-- Item row dynamically added here -->
        </div>
        <button type="button" id="add-item" class="btn btn-primary mt-2">Add Item</button>
        
        <hr>
        
        <!-- Live Totals Section -->
        <div class="d-flex justify-content-between align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="applyVat">
            <label class="form-check-label fw-bold" for="applyVat">Apply 20% Standard VAT</label>
          </div>
          <div class="text-end">
            <div class="text-muted">Subtotal: <span id="ui-subtotal">£0.00</span></div>
            <div class="text-muted" id="ui-vat-row" style="display: none;">VAT (20%): <span id="ui-vat">£0.00</span></div>
            <h4 class="mt-2 mb-0 fw-bold">Total: <span id="ui-total">£0.00</span></h4>
          </div>
        </div>
      </div>
      
      <!-- Courier & Payment -->
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="includeCourier">
        <label class="form-check-label" for="includeCourier">Include Courier Contact Details</label>
      </div>
      
      <div id="courier-details" style="display: none;" class="mb-3 p-3 border rounded">
        <div class="mb-3"><label class="form-label">Courier Name <span class="text-danger">*</span></label><input type="text" class="form-control" id="courierName"></div>
        <div class="mb-3"><label class="form-label">Courier Number <span class="text-danger">*</span></label><input type="text" class="form-control" id="courierNumber"></div>
        <div class="mb-3"><label class="form-label">Payment Instructions <span class="text-danger">*</span></label><textarea class="form-control" id="paymentInstructions" rows="3" required></textarea></div>
      </div>
      
      <!-- Bank Details -->
      <div class="mb-3 p-3 border rounded">
        <h4>Bank Details <span class="text-danger">*</span></h4>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="bankDetails" id="option1" value="option1" checked>
          <label class="form-check-label" for="option1">Option 1: Mrs Marcia Platts</label>
        </div>
        <div id="bank-option1" class="mt-2 text-muted"><p>Mrs Marcia Platts<br>A/c. 64237273<br>Sort. 01-08-38</p></div>
        
        <div class="form-check mt-3">
          <input class="form-check-input" type="radio" name="bankDetails" id="option2" value="option2">
          <label class="form-check-label" for="option2">Option 2: Enter Bank Details Manually</label>
        </div>
        <div id="bank-option2" class="mt-2" style="display: none;">
          <div class="mb-3"><label class="form-label">Account Holder <span class="text-danger">*</span></label><input type="text" class="form-control" id="accountHolder"></div>
          <div class="mb-3"><label class="form-label">Account Number <span class="text-danger">*</span></label><input type="text" class="form-control" id="accountNumber"></div>
          <div class="mb-3"><label class="form-label">Sort Code <span class="text-danger">*</span></label><input type="text" class="form-control" id="sortCode"></div>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="mb-4">
        <label for="footer" class="form-label">Footer Notice</label>
        <input type="text" class="form-control" id="footer" placeholder="Enter footer text">
      </div>
      
      <!-- Action Buttons -->
      <div class="d-flex gap-2 flex-wrap pb-4 border-bottom">
        <button type="button" id="generateInvoice" class="btn btn-success">Generate PDF Invoice</button>
        <button type="button" id="saveInvoice" class="btn btn-info text-white">Save to Local History</button>
        <button type="button" id="shareLinkBtn" class="btn btn-warning">Copy Shareable URL</button>
        <small id="shareWarning" class="text-danger d-none mt-2 w-100">Sharing via URL is disabled because local images are attached (file size too large for URLs).</small>
      </div>
    </form>
    
    <!-- History -->
    <div id="history-section" class="mt-4 mb-5">
      <h4>Saved Invoices History</h4>
      <div id="history-list" class="list-group mt-3"></div>
    </div>

    <!-- Hidden Content for PDF Generation -->
    <div id="invoice-content" style="display: none;"></div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const invoiceForm = document.getElementById('invoice-form');
      const postcodeInput = document.getElementById('postcode');
      const addressSuggestions = document.getElementById('address-suggestions');
      const addressFields = document.getElementById('address-fields');
      const enterAddressManuallyButton = document.getElementById('enter-address-manually');
      const addItemButton = document.getElementById('add-item');
      const itemsContainer = document.getElementById('items-container');
      const bankOptions = document.getElementsByName('bankDetails');
      const generateInvoiceButton = document.getElementById('generateInvoice');
      const saveInvoiceButton = document.getElementById('saveInvoice');
      const shareLinkBtn = document.getElementById('shareLinkBtn');
      const historyList = document.getElementById('history-list');
      const applyVatCheckbox = document.getElementById('applyVat');
      
      document.getElementById('footer').value = "For any inquiries, please contact us at Mjplatts@hotmail.co.uk or call 07713883813.";

      initializeInvoice();
      postcodeInput.required = true;
      addItemButton.click(); // Add first item on load
      renderHistory();
      checkUrlForData();

      function debounce(func, delay) {
        let timer;
        return function(...args) { clearTimeout(timer); timer = setTimeout(() => func.apply(this, args), delay); };
      }

      function sanitizeHTML(str) {
        const temp = document.createElement('div');
        temp.textContent = str;
        return temp.innerHTML;
      }

      function initializeInvoice() {
        const today = new Date();
        const formattedDate = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;
        document.getElementById('invoiceDate').value = formattedDate;

        const prefix = `INV-${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}-`;
        document.getElementById('invoiceNumber').value = prefix;

        let seq = parseInt(localStorage.getItem(`invoiceSeq-${prefix}`) || '1', 10);
        document.getElementById('invoiceSequence').value = String(seq).padStart(3, '0');
      }

      postcodeInput.addEventListener('input', debounce((e) => {
        const term = e.target.value.trim();
        if (term.length < 3) return addressSuggestions.style.display = 'none';

        fetch(`https://api.getaddress.io/autocomplete/${encodeURIComponent(term)}?api-key=fh7uRcMyDEmfFGo0Cd0wYw46781`)
          .then(res => res.json())
          .then(data => {
            addressSuggestions.innerHTML = '';
            (data.suggestions || []).forEach(sug => {
              const btn = document.createElement('button');
              btn.className = 'list-group-item list-group-item-action';
              btn.textContent = sug.address;
              btn.onclick = () => {
                const parts = sug.address.split(',').map(p => p.trim());
                document.getElementById('addressLine1').value = parts[0] || '';
                document.getElementById('addressLine2').value = parts[1] || '';
                document.getElementById('city').value = parts[2] || '';
                document.getElementById('postalCode').value = parts[parts.length - 1] || '';
                document.getElementById('country').value = 'United Kingdom';
                addressFields.style.display = 'block';
                addressSuggestions.style.display = 'none';
              };
              addressSuggestions.appendChild(btn);
            });
            addressSuggestions.style.display = 'block';
          });
      }, 300));

      enterAddressManuallyButton.addEventListener('click', () => {
        addressFields.style.display = 'block';
        postcodeInput.style.display = 'none';
        addressSuggestions.style.display = 'none';
      });

      // ---- Totals Calculation Logic ----
      function calculateLiveTotals() {
        let subtotal = 0;
        document.querySelectorAll('.item-amount').forEach(input => {
          const val = parseFloat(input.value);
          if (!isNaN(val)) subtotal += val;
        });
        
        const applyVat = applyVatCheckbox.checked;
        const vat = applyVat ? subtotal * 0.20 : 0;
        const total = subtotal + vat;

        document.getElementById('ui-subtotal').textContent = `£${subtotal.toFixed(2)}`;
        document.getElementById('ui-vat').textContent = `£${vat.toFixed(2)}`;
        document.getElementById('ui-vat-row').style.display = applyVat ? 'block' : 'none';
        document.getElementById('ui-total').textContent = `£${total.toFixed(2)}`;

        return { subtotal, vat, total, applyVat };
      }

      applyVatCheckbox.addEventListener('change', calculateLiveTotals);

      addItemButton.addEventListener('click', () => {
        const row = document.createElement('div');
        row.className = 'row mb-2 item align-items-center';
        row.innerHTML = `
          <div class="col-md-3"><input type="text" class="form-control item-desc" placeholder="Item Description" required></div>
          <div class="col-md-2"><input type="number" class="form-control item-amount" placeholder="Amount (£)" min="0" step="0.01" required></div>
          <div class="col-md-5">
            <div class="input-group">
              <input type="text" class="form-control image-url" placeholder="Paste Image URL">
              <span class="input-group-text">OR</span>
              <input type="file" class="form-control image-upload" accept="image/*" style="max-width: 110px;">
            </div>
            <input type="hidden" class="image-base64">
            <img src="" class="image-preview-thumbnail border mt-1">
          </div>
          <div class="col-md-2"><button type="button" class="btn btn-danger remove-item w-100">Remove</button></div>
        `;
        itemsContainer.appendChild(row);
        
        // Listen for value changes to update total live
        row.querySelector('.item-amount').addEventListener('input', calculateLiveTotals);
      });

      itemsContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-item')) {
          e.target.closest('.item').remove();
          calculateLiveTotals(); // Recalculate when item is removed
        }
      });

      // Canvas image compression
      itemsContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('image-upload')) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 200;
              const scale = Math.min(MAX_WIDTH / img.width, 1);
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;

              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

              const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
              const parent = e.target.closest('.col-md-5');
              parent.querySelector('.image-base64').value = compressedBase64;
              const preview = parent.querySelector('.image-preview-thumbnail');
              preview.src = compressedBase64;
              preview.style.display = 'block';

              document.getElementById('shareLinkBtn').disabled = true;
              document.getElementById('shareWarning').classList.remove('d-none');
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      });

      bankOptions.forEach(opt => opt.addEventListener('change', (e) => {
        document.getElementById('bank-option1').style.display = e.target.value === 'option1' ? 'block' : 'none';
        document.getElementById('bank-option2').style.display = e.target.value === 'option2' ? 'block' : 'none';
      }));

      document.getElementById('includeCourier').addEventListener('change', (e) => {
        document.getElementById('courier-details').style.display = e.target.checked ? 'block' : 'none';
      });

      function collectFormData() {
        const data = {
          seq: document.getElementById('invoiceSequence').value,
          toName: document.getElementById('invoiceToName').value,
          email: document.getElementById('invoiceEmail').value,
          addr1: document.getElementById('addressLine1').value,
          addr2: document.getElementById('addressLine2').value,
          city: document.getElementById('city').value,
          post: document.getElementById('postalCode').value,
          country: document.getElementById('country').value,
          incCourier: document.getElementById('includeCourier').checked,
          cName: document.getElementById('courierName').value,
          cNum: document.getElementById('courierNumber').value,
          payInst: document.getElementById('paymentInstructions').value,
          footer: document.getElementById('footer').value,
          applyVat: document.getElementById('applyVat').checked,
          items: []
        };
        
        document.querySelectorAll('.item').forEach(item => {
          const desc = item.querySelector('.item-desc').value;
          const amt = item.querySelector('.item-amount').value;
          const url = item.querySelector('.image-url').value;
          const b64 = item.querySelector('.image-base64').value;
          
          if (desc || amt) data.items.push({ desc, amt, img: b64 || url });
        });
        return data;
      }

      shareLinkBtn.addEventListener('click', () => {
        try {
          const b64 = btoa(encodeURIComponent(JSON.stringify(collectFormData())));
          navigator.clipboard.writeText(window.location.href.split('#')[0] + '#' + b64);
          alert('Link copied! You can share this URL.');
        } catch(e) { alert('Data too large for URL. Clear local images and try again.'); }
      });

      function checkUrlForData() {
        if(window.location.hash.length > 5) {
          try {
            const data = JSON.parse(decodeURIComponent(atob(window.location.hash.substring(1))));
            loadInvoiceData(data);
            window.location.hash = '';
          } catch(e) {}
        }
      }

      saveInvoiceButton.addEventListener('click', () => {
        const data = collectFormData();
        data.fullNum = document.getElementById('invoiceNumber').value + data.seq;
        data.date = document.getElementById('invoiceDate').value;
        const totals = calculateLiveTotals();
        data.total = totals.total;
        
        let hist = JSON.parse(localStorage.getItem('invHist')) || [];
        try {
          hist.push(data);
          localStorage.setItem('invHist', JSON.stringify(hist));
          alert('Invoice saved successfully to local device memory!');
          renderHistory();
        } catch (e) {
          alert('Storage full! You have saved too many images. Please clear browser data.');
        }
      });

      function renderHistory() {
        let hist = JSON.parse(localStorage.getItem('invHist')) || [];
        historyList.innerHTML = '';
        hist.slice().reverse().forEach(data => {
          const btn = document.createElement('button');
          btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
          btn.innerHTML = `<span><strong>${data.fullNum}</strong> - ${data.toName} (${data.date}) - £${(data.total || 0).toFixed(2)}</span><span class="badge bg-primary rounded-pill">Load</span>`;
          btn.onclick = () => loadInvoiceData(data);
          historyList.appendChild(btn);
        });
      }

      function loadInvoiceData(data) {
        document.getElementById('invoiceSequence').value = data.seq || '';
        document.getElementById('invoiceToName').value = data.toName || '';
        document.getElementById('invoiceEmail').value = data.email || '';
        if(data.addr1) {
          document.getElementById('address-fields').style.display = 'block';
          document.getElementById('postcode').style.display = 'none';
          document.getElementById('addressLine1').value = data.addr1;
          document.getElementById('addressLine2').value = data.addr2;
          document.getElementById('city').value = data.city;
          document.getElementById('postalCode').value = data.post;
          document.getElementById('country').value = data.country;
        }
        document.getElementById('includeCourier').checked = data.incCourier;
        document.getElementById('courier-details').style.display = data.incCourier ? 'block' : 'none';
        document.getElementById('courierName').value = data.cName || '';
        document.getElementById('courierNumber').value = data.cNum || '';
        document.getElementById('paymentInstructions').value = data.payInst || '';
        document.getElementById('applyVat').checked = data.applyVat || false;
        
        itemsContainer.innerHTML = '';
        if(data.items.length) {
          data.items.forEach(i => {
            document.getElementById('add-item').click();
            const last = itemsContainer.lastElementChild;
            last.querySelector('.item-desc').value = i.desc;
            last.querySelector('.item-amount').value = i.amt;
            if (i.img && i.img.startsWith('data:image')) {
               last.querySelector('.image-base64').value = i.img;
               const preview = last.querySelector('.image-preview-thumbnail');
               preview.src = i.img;
               preview.style.display = 'block';
            } else {
               last.querySelector('.image-url').value = i.img || '';
            }
          });
        }
        calculateLiveTotals();
        window.scrollTo(0,0);
      }

      generateInvoiceButton.addEventListener('click', async () => {
        const data = collectFormData();
        const totals = calculateLiveTotals(); // Extract specific figures for PDF
        const invNum = document.getElementById('invoiceNumber').value + data.seq;
        
        let bankHtml = document.getElementById('option1').checked 
          ? `Mrs Marcia Platts<br>A/c. 64237273<br>Sort. 01-08-38` 
          : `${sanitizeHTML(document.getElementById('accountHolder').value)}<br>A/c. ${sanitizeHTML(document.getElementById('accountNumber').value)}<br>Sort. ${sanitizeHTML(document.getElementById('sortCode').value)}`;

        // HTML Layout grouped for optimal single page display and dynamic items splitting
        const html = `
          <div class="invoice-pdf-content">
            <img src="https://raw.githubusercontent.com/hugh-platts/riddit-invoice-generator/main/darklogo2.png" class="invoice-logo" crossorigin="anonymous">
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <div>
                    <h2 style="text-align: left; margin:0;">INVOICE</h2>
                    <p style="margin-top: 5px;"><strong>Date:</strong> ${sanitizeHTML(document.getElementById('invoiceDate').value)}<br>
                    <strong>Invoice No:</strong> ${sanitizeHTML(invNum)}</p>
                </div>
                <div style="text-align: right;">
                    <strong>Bill To:</strong><br>
                    ${sanitizeHTML(data.toName)}<br>
                    ${sanitizeHTML(data.addr1)}<br>
                    ${sanitizeHTML(data.city)}, ${sanitizeHTML(data.post)}
                </div>
            </div>
            
            <table>
              <thead><tr><th>Description</th><th style="width: 100px;">Amount (£)</th><th style="width: 80px; text-align: center;">Image</th></tr></thead>
              <tbody>
                ${data.items.map(i => `<tr>
                  <td>${sanitizeHTML(i.desc)}</td>
                  <td>${parseFloat(i.amt).toFixed(2)}</td>
                  <td style="text-align: center;">${i.img ? `<img src="${i.img}" class="item-image" crossorigin="anonymous">` : ''}</td>
                </tr>`).join('')}
              </tbody>
            </table>
            
            <div class="invoice-totals-box">
                <p>Subtotal: £${totals.subtotal.toFixed(2)}</p>
                ${totals.applyVat ? `<p>VAT (20%): £${totals.vat.toFixed(2)}</p>` : ''}
                <h3>Total: £${totals.total.toFixed(2)}</h3>
            </div>

            <div class="invoice-footer-grid">
                <div>
                    <h4>Bank Details</h4>
                    <p>${bankHtml}</p>
                </div>
                ${data.incCourier ? `
                <div>
                    <h4>Courier & Payment Info</h4>
                    <p><strong>Name:</strong> ${sanitizeHTML(data.cName)}<br>
                    <strong>Number:</strong> ${sanitizeHTML(data.cNum)}<br>
                    <strong>Ref:</strong> ${sanitizeHTML(data.payInst)}</p>
                </div>` : '<div></div>'}
            </div>
            
            <footer><p>${sanitizeHTML(data.footer)}<br>Thank you for your business! Marcia (Riddit Homes)</p></footer>
          </div>
        `;
        
        const container = document.getElementById('invoice-content');
        container.innerHTML = html;
        container.style.display = 'block';

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        // Wait briefly for images to mount
        setTimeout(async () => {
            await pdf.html(container.querySelector('.invoice-pdf-content'), {
              callback: function (doc) {
                doc.save(`${data.toName.replace(/[^a-z0-9]/gi, '_')}_${invNum}.pdf`);
              },
              margin: [10, 10, 10, 10], // Tighter margins to assist fitting large arrays
              autoPaging: 'text',
              x: 0,
              y: 0,
              width: 190, 
              windowWidth: container.scrollWidth
            });
            container.style.display = 'none';
        }, 100);
      });
    });
  </script>
</body>
</html>
